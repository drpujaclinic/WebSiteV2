name: Daily Uptime Monitor

on:
  schedule:
    # Runs every day at 7:00 AM UTC (adjust the time if needed)
    - cron: '0 7 * * *'
  workflow_dispatch: # Allows you to run it manually anytime

jobs:
  check-uptime:
    runs-on: ubuntu-latest

    steps:
      - name: Check Website Status
        run: |
          # Replace the URL below with your actual live GitHub Pages URL if it differs
          STATUS_CODE=$(curl -s -o /dev/null -w "%{http_code}" https://drpujaclinic.github.io/WebSiteV2/)
          
          echo "Website responded with status code: $STATUS_CODE"
          
          if [ "$STATUS_CODE" -ne 200 ]; then
            echo "Error: Website appears to be down!"
            exit 1
          fi
